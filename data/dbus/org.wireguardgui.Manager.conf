<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the bus name (the daemon runs as root) -->
  <policy user="root">
    <allow own="org.wireguardgui.Manager"/>
    <allow send_destination="org.wireguardgui.Manager"/>
    <allow send_interface="org.wireguardgui.Manager"/>
  </policy>

  <!-- Any local user can call methods and receive signals -->
  <policy context="default">
    <allow send_destination="org.wireguardgui.Manager"/>
    <allow send_interface="org.wireguardgui.Manager"/>
    <allow receive_sender="org.wireguardgui.Manager"/>
    <allow receive_interface="org.wireguardgui.Manager"/>
  </policy>
</busconfig>
